name: Full Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Component + E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      checks: write
      pull-requests: write

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r tests/requirements.txt

      # ── 1. Component Tests (Vitest) ────────────────────────────────────────
      - name: Run component tests (Vitest)
        id: vitest
        run: |
          mkdir -p reports
          npx vitest run \
            --reporter=verbose \
            --reporter=json \
            --outputFile.json=reports/vitest-results.json \
            || echo "VITEST_FAILED=true" >> $GITHUB_ENV
        continue-on-error: true

      # ── 2. Build & Start Next.js for E2E ──────────────────────────────────
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://agridirect-backend-80yz.onrender.com' }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'placeholder' }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || 'placeholder' }}

      - name: Start Next.js server (background)
        run: |
          npm start &
          echo "Waiting for Next.js on port 3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i} attempts"
              break
            fi
            echo "Attempt $i — waiting 3s..."
            sleep 3
          done
          curl -sf http://localhost:3000 || (echo "Server never started" && exit 1)
        env:
          PORT: 3000

      # ── 3. E2E Tests (Selenium / pytest) ──────────────────────────────────
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run E2E tests (Selenium)
        id: selenium
        run: |
          mkdir -p reports
          python -m pytest tests/e2e \
            --junitxml=${{ github.workspace }}/reports/pytest-results.xml \
            --tb=short \
            -v \
            --continue-on-collection-errors \
            -p no:cacheprovider \
            || echo "SELENIUM_FAILED=true" >> $GITHUB_ENV
        env:
          TEST_BASE_URL: http://localhost:3000
          PYTHONPATH: ${{ github.workspace }}/tests/e2e
        continue-on-error: true

      # ── 3b. Debug pytest XML ──────────────────────────────────────────────
      - name: Show pytest XML (debug)
        if: always()
        run: |
          echo "=== pytest-results.xml ==="
          cat ${{ github.workspace }}/reports/pytest-results.xml 2>/dev/null || echo "(file not found)"
          echo "=== reports dir ==="
          ls -la reports/ 2>/dev/null || echo "(reports dir not found)"

      # ── 4. Generate Excel report ───────────────────────────────────────────
      - name: Generate Excel report
        if: always()
        continue-on-error: true
        run: |
          python tests/generate_report.py \
            --vitest reports/vitest-results.json \
            --pytest  reports/pytest-results.xml \
            --out     reports/test-report-${{ github.run_number }}.xlsx

      # ── 5. Write Job Summary ──────────────────────────────────────────────
      - name: Write test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl= `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const branch   = context.ref.replace('refs/heads/', '');
            const shortSha = context.sha.slice(0, 7);
            const now      = new Date().toUTCString();

            // ── Helpers ───────────────────────────────────────────────────
            const fmtMs = ms => ms == null ? '—' : ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(2)}s`;
            const passBar = (pass, total) => {
              if (total === 0) return '`no tests`';
              const pct = Math.round((pass / total) * 20);
              return '`' + '█'.repeat(pct) + '░'.repeat(20 - pct) + '`' + ` ${Math.round(pass/total*100)}%`;
            };
            const statusIcon = (pass, fail, skip) =>
              fail > 0 ? '❌' : skip > 0 && pass === 0 ? '⏭' : '✅';

            // ── Parse Vitest JSON ─────────────────────────────────────────
            let vtTotal = 0, vtPass = 0, vtFail = 0, vtSkip = 0;
            let vtDuration = null;
            const vtSuites  = [];   // per-file breakdown
            const vtAllTests = [];  // every individual test

            try {
              const raw = JSON.parse(fs.readFileSync('reports/vitest-results.json', 'utf8'));
              vtDuration = raw.testResults
                ? raw.testResults.reduce((s, r) => s + (r.endTime - r.startTime), 0)
                : null;

              for (const suite of (raw.testResults || [])) {
                const fileName = suite.name.replace(process.cwd() + '/', '');
                let sPass = 0, sFail = 0, sSkip = 0;
                const suiteDur = suite.endTime - suite.startTime;

                for (const t of (suite.assertionResults || [])) {
                  vtTotal++; const dur = t.duration ?? null;
                  const label = [...(t.ancestorTitles || []), t.title].join(' › ');
                  if (t.status === 'passed')       { vtPass++; sPass++; }
                  else if (t.status === 'failed')  { vtFail++; sFail++; }
                  else                             { vtSkip++; sSkip++; }
                  vtAllTests.push({ label, status: t.status, dur,
                    file: fileName,
                    error: t.status === 'failed'
                      ? (t.failureMessages || []).join('\n').slice(0, 600)
                      : null });
                }
                vtSuites.push({ file: fileName, sPass, sFail, sSkip,
                  total: sPass+sFail+sSkip, dur: suiteDur });
              }
            } catch (e) { console.log('Vitest parse error:', e.message); }

            // ── Parse pytest XML ──────────────────────────────────────────
            let pyTotal = 0, pyPass = 0, pyFail = 0, pySkip = 0;
            let pyDuration = null;
            const pySuites   = [];
            const pyAllTests = [];

            try {
              const xml = fs.readFileSync('reports/pytest-results.xml', 'utf8');
              console.log('pytest XML first 300 chars:', xml.slice(0, 300));
              // Extract each attribute independently — order varies across pytest versions
              const suiteTag = xml.match(/<testsuite[^>]+>/)?.[0] ?? '';
              const attr = name => { const m = suiteTag.match(new RegExp(`${name}="([^"]+)"`)); return m ? parseInt(m[1]) : 0; };
              const attrF = name => { const m = suiteTag.match(new RegExp(`${name}="([^"]+)"`)); return m ? parseFloat(m[1]) : null; };
              if (suiteTag) {
                pyTotal    = attr('tests');
                const errs = attr('errors');
                const fail = attr('failures');
                pyFail     = fail + errs;
                pySkip     = attr('skipped');
                pyPass     = pyTotal - pyFail - pySkip;
                pyDuration = attrF('time') ? attrF('time') * 1000 : null;
                console.log(`pytest parsed: tests=${pyTotal} pass=${pyPass} fail=${pyFail} skip=${pySkip}`);
              } else {
                console.log('No <testsuite> tag found in XML');
              }

              const classMap = {};
              // Match both <testcase .../> (self-closing) and <testcase ...>...</testcase>
              const cases = [...xml.matchAll(/<testcase([^>]+?)(?:\/>|>([\s\S]*?)<\/testcase>)/g)];
              console.log(`pytest testcases found: ${cases.length}`);
              for (const tc of cases) {
                const attrs  = tc[1];
                const inner  = tc[2] ?? '';
                const nameM  = attrs.match(/name="([^"]+)"/);
                const classM = attrs.match(/classname="([^"]+)"/);
                const timeM  = attrs.match(/time="([^"]+)"/);
                const name   = nameM  ? nameM[1]  : '?';
                const cls    = classM ? classM[1] : 'unknown';
                const dur    = timeM  ? parseFloat(timeM[1]) * 1000 : null;
                const isFail = /<failure|<error/.test(inner);
                const isSkip = /<skipped/.test(inner);
                const msgM   = inner.match(/message="([^"]*)"/);
                const textM  = inner.match(/<(?:failure|error)[^>]*>([\s\S]*?)<\/(?:failure|error)>/);
                const errMsg = msgM ? msgM[1] : '';
                const errTxt = textM ? textM[1].trim().slice(0, 600) : '';

                if (!classMap[cls]) classMap[cls] = { pass:0, fail:0, skip:0, dur:0 };
                if (isFail)      classMap[cls].fail++;
                else if (isSkip) classMap[cls].skip++;
                else             classMap[cls].pass++;
                classMap[cls].dur += dur || 0;

                pyAllTests.push({ label: `${cls} :: ${name}`,
                  status: isFail ? 'failed' : isSkip ? 'skipped' : 'passed',
                  dur, file: 'tests/e2e',
                  error: isFail ? (errMsg + (errTxt ? '\n' + errTxt : '')).slice(0, 600) : null });
              }
              for (const [cls, c] of Object.entries(classMap)) {
                pySuites.push({ file: cls, sPass: c.pass, sFail: c.fail, sSkip: c.skip,
                  total: c.pass+c.fail+c.skip, dur: c.dur });
              }

              // Always recompute totals from individual cases — testsuite tag attr order is unreliable
              pyPass  = pyAllTests.filter(t => t.status === 'passed').length;
              pyFail  = pyAllTests.filter(t => t.status === 'failed').length;
              pySkip  = pyAllTests.filter(t => t.status === 'skipped').length;
              pyTotal = pyAllTests.length;
              if (pyDuration === null)
                pyDuration = pySuites.reduce((s, c) => s + c.dur, 0) || null;
              console.log(`pytest final: total=${pyTotal} pass=${pyPass} fail=${pyFail} skip=${pySkip}`);
            } catch (e) { console.log('Pytest parse error:', e.message); }

            // ── Parse coverage (if present) ───────────────────────────────
            let coverageSummary = null;
            try {
              const cov = JSON.parse(fs.readFileSync('reports/coverage/coverage-summary.json', 'utf8'));
              const t   = cov.total;
              coverageSummary = {
                lines:      t.lines?.pct ?? '—',
                statements: t.statements?.pct ?? '—',
                functions:  t.functions?.pct ?? '—',
                branches:   t.branches?.pct ?? '—',
              };
            } catch (_) {}

            // ── Aggregate ─────────────────────────────────────────────────
            const grandTotal = vtTotal + pyTotal;
            const grandPass  = vtPass  + pyPass;
            const grandFail  = vtFail  + pyFail;
            const grandSkip  = vtSkip  + pySkip;
            const overallIcon = grandFail > 0 ? '❌' : '✅';
            const overallLabel = grandFail > 0
              ? `${grandFail} test${grandFail>1?'s':''} FAILED`
              : 'All tests PASSED';

            // ── Build markdown ─────────────────────────────────────────────
            let md = '';

            // Header
            md += `# ${overallIcon} AgriDirect Web — Test Suite Report\n\n`;
            md += `> **${overallLabel}** &nbsp;|&nbsp; `;
            md += `Run [#${context.runNumber}](${runUrl}) &nbsp;|&nbsp; `;
            md += `Branch \`${branch}\` &nbsp;|&nbsp; `;
            md += `Commit [\`${shortSha}\`](${commitUrl}) &nbsp;|&nbsp; `;
            md += `${now}\n\n`;
            md += `---\n\n`;

            // Overall scoreboard
            md += `## 📊 Overall Results\n\n`;
            md += `| Metric | Value |\n|--------|-------|\n`;
            md += `| 🧪 Total Tests | **${grandTotal}** |\n`;
            md += `| ✅ Passed | **${grandPass}** |\n`;
            md += `| ❌ Failed | **${grandFail}** |\n`;
            md += `| ⏭ Skipped | **${grandSkip}** |\n`;
            md += `| 📈 Pass Rate | ${passBar(grandPass, grandTotal)} |\n`;
            if (vtDuration != null) md += `| ⏱ Vitest Duration | ${fmtMs(vtDuration)} |\n`;
            if (pyDuration != null) md += `| ⏱ Selenium Duration | ${fmtMs(pyDuration)} |\n`;
            md += `\n`;

            // Suite comparison table
            md += `## 🗂 Suite Breakdown\n\n`;
            md += `| Suite | Total | ✅ | ❌ | ⏭ | Pass Rate | Duration |\n`;
            md += `|-------|------:|--:|--:|--:|-----------|----------|\n`;
            md += `| 🔬 Component Tests (Vitest) | ${vtTotal} | ${vtPass} | ${vtFail} | ${vtSkip} | ${passBar(vtPass,vtTotal)} | ${fmtMs(vtDuration)} |\n`;
            md += `| 🌐 E2E Tests (Selenium) | ${pyTotal} | ${pyPass} | ${pyFail} | ${pySkip} | ${passBar(pyPass,pyTotal)} | ${fmtMs(pyDuration)} |\n`;
            md += `| **Grand Total** | **${grandTotal}** | **${grandPass}** | **${grandFail}** | **${grandSkip}** | ${passBar(grandPass,grandTotal)} | — |\n\n`;

            // Coverage
            if (coverageSummary) {
              md += `## 🛡 Code Coverage\n\n`;
              md += `| Metric | % |\n|--------|---|\n`;
              md += `| Lines | ${coverageSummary.lines}% |\n`;
              md += `| Statements | ${coverageSummary.statements}% |\n`;
              md += `| Functions | ${coverageSummary.functions}% |\n`;
              md += `| Branches | ${coverageSummary.branches}% |\n\n`;
            }

            // ── Vitest: per-file breakdown ────────────────────────────────
            md += `## 🔬 Component Tests — File Breakdown\n\n`;
            if (vtSuites.length === 0) {
              md += `_No component test results found._\n\n`;
            } else {
              md += `| File | Total | ✅ | ❌ | ⏭ | Duration |\n`;
              md += `|------|------:|--:|--:|--:|---------|\n`;
              for (const s of vtSuites) {
                const icon = statusIcon(s.sPass, s.sFail, s.sSkip);
                const shortFile = s.file.replace(/^tests\/components\//, '');
                md += `| ${icon} \`${shortFile}\` | ${s.total} | ${s.sPass} | ${s.sFail} | ${s.sSkip} | ${fmtMs(s.dur)} |\n`;
              }
              md += `\n`;

              // All vitest tests
              md += `<details>\n<summary>📋 All Component Tests (${vtTotal} tests)</summary>\n\n`;
              md += `| Status | Test Name | Duration |\n|--------|-----------|----------|\n`;
              for (const t of vtAllTests) {
                const icon = t.status === 'passed' ? '✅' : t.status === 'failed' ? '❌' : '⏭';
                md += `| ${icon} | ${t.label} | ${fmtMs(t.dur)} |\n`;
              }
              md += `\n</details>\n\n`;
            }

            // ── Vitest failures detail ────────────────────────────────────
            const vtFailed = vtAllTests.filter(t => t.status === 'failed');
            if (vtFailed.length > 0) {
              md += `## ❌ Component Test Failures\n\n`;
              for (const t of vtFailed) {
                md += `<details>\n<summary>❌ <strong>${t.label}</strong></summary>\n\n`;
                md += `**File:** \`${t.file}\`\n\n`;
                if (t.error) {
                  md += `\`\`\`\n${t.error}\n\`\`\`\n`;
                }
                md += `</details>\n\n`;
              }
            }

            // ── Selenium: per-class breakdown ─────────────────────────────
            md += `## 🌐 E2E Tests — Class Breakdown\n\n`;
            if (pySuites.length === 0) {
              md += `_No E2E test results found._\n\n`;
            } else {
              md += `| Class | Total | ✅ | ❌ | ⏭ | Duration |\n`;
              md += `|-------|------:|--:|--:|--:|---------|\n`;
              for (const s of pySuites) {
                const icon = statusIcon(s.sPass, s.sFail, s.sSkip);
                md += `| ${icon} \`${s.file}\` | ${s.total} | ${s.sPass} | ${s.sFail} | ${s.sSkip} | ${fmtMs(s.dur)} |\n`;
              }
              md += `\n`;

              md += `<details>\n<summary>📋 All E2E Tests (${pyTotal} tests)</summary>\n\n`;
              md += `| Status | Test Name | Duration |\n|--------|-----------|----------|\n`;
              for (const t of pyAllTests) {
                const icon = t.status === 'passed' ? '✅' : t.status === 'failed' ? '❌' : '⏭';
                md += `| ${icon} | ${t.label} | ${fmtMs(t.dur)} |\n`;
              }
              md += `\n</details>\n\n`;
            }

            // ── Selenium failure detail ───────────────────────────────────
            const pyFailed = pyAllTests.filter(t => t.status === 'failed');
            if (pyFailed.length > 0) {
              md += `## ❌ E2E Test Failures\n\n`;
              for (const t of pyFailed) {
                md += `<details>\n<summary>❌ <strong>${t.label}</strong></summary>\n\n`;
                if (t.error) {
                  md += `\`\`\`\n${t.error}\n\`\`\`\n`;
                }
                md += `</details>\n\n`;
              }
            }

            // ── Environment & artifact info ───────────────────────────────
            md += `---\n\n`;
            md += `## ⚙️ Environment\n\n`;
            md += `| Key | Value |\n|-----|-------|\n`;
            md += `| Runner OS | \`ubuntu-latest\` |\n`;
            md += `| Node.js | \`20\` |\n`;
            md += `| Python | \`3.11\` |\n`;
            md += `| Triggered by | \`${context.eventName}\` |\n`;
            md += `| Actor | [@${context.actor}](${context.serverUrl}/${context.actor}) |\n`;
            md += `| Workflow | [${context.workflow}](${runUrl}) |\n`;
            md += `| Artifacts | [Download test report & screenshots](${runUrl}#artifacts) |\n\n`;

            // Footer
            if (grandFail === 0) {
              md += `> 🎉 **Perfect run!** Every single test passed. Great work!\n`;
            } else {
              md += `> ⚠️ **${grandFail} test(s) failed.** Check the failure details above and the [run annotations](${runUrl}).\n`;
            }

            await core.summary.addRaw(md).write();

      # ── 7. Upload artifacts ────────────────────────────────────────────────
      - name: Upload test report (Excel)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: |
            reports/test-report-*.xlsx
            reports/vitest-results.json
            reports/pytest-results.xml
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: reports/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      # ── 8. Add inline annotations for each test failure ───────────────────
      - name: Annotate failures
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Parse Vitest JSON
            let vitestFailed = [];
            try {
              const raw = JSON.parse(fs.readFileSync('reports/vitest-results.json', 'utf8'));
              for (const suite of (raw.testResults || [])) {
                for (const t of (suite.assertionResults || [])) {
                  if (t.status === 'failed') {
                    vitestFailed.push({
                      file: suite.name.replace(process.cwd() + '/', ''),
                      title: [...(t.ancestorTitles || []), t.title].join(' > '),
                      error: (t.failureMessages || []).join('\n').slice(0, 300),
                    });
                  }
                }
              }
            } catch (e) { console.log('No vitest results:', e.message); }

            // Parse pytest XML
            let seleniumFailed = [];
            try {
              const xml = fs.readFileSync('reports/pytest-results.xml', 'utf8');
              const matches = [...xml.matchAll(/<testcase[^>]+name="([^"]+)"[^>]*classname="([^"]+)"[^>]*>[\s\S]*?<(?:failure|error)[^>]*message="([^"]*)"[^>]*>/g)];
              seleniumFailed = matches.map(m => ({
                file: 'tests/e2e',
                title: `${m[2]}.${m[1]}`,
                error: m[3].slice(0, 300),
              }));
            } catch (e) { console.log('No pytest results:', e.message); }

            const allFailed = [...vitestFailed, ...seleniumFailed];
            for (const f of allFailed) {
              core.error(`TEST FAILED: ${f.title}\n${f.error}`, { file: f.file, title: f.title });
            }
            if (allFailed.length > 0) {
              core.warning(`${allFailed.length} test(s) failed. See annotations above.`);
            }

      # ── 9. Auto-create / update GitHub Issues for failures ─────────────────
      - name: Create or update GitHub Issues for failures
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Collect all failures
            const failures = [];
            try {
              const raw = JSON.parse(fs.readFileSync('reports/vitest-results.json', 'utf8'));
              for (const suite of (raw.testResults || [])) {
                for (const t of (suite.assertionResults || [])) {
                  if (t.status === 'failed') {
                    failures.push({
                      title: `[Test Failure] ${[...(t.ancestorTitles||[]), t.title].join(' > ')}`,
                      body: `**Suite:** ${suite.name}\n**Error:**\n\`\`\`\n${(t.failureMessages||[]).join('\n').slice(0,1000)}\n\`\`\`\n\n**Run:** ${runUrl}`,
                    });
                  }
                }
              }
            } catch (e) {}

            try {
              const xml = fs.readFileSync('reports/pytest-results.xml', 'utf8');
              const nameRe = /<testcase[^>]+name="([^"]+)"[^>]*classname="([^"]+)"[^>]*>/g;
              const failRe = /<(?:failure|error)[^>]*message="([^"]*)"/g;
              const cases = [...xml.matchAll(/<testcase([^>]+)>([\s\S]*?)<\/testcase>/g)];
              for (const tc of cases) {
                if (!/<failure|<error/.test(tc[2])) continue;
                const nameM = tc[1].match(/name="([^"]+)"/);
                const classM = tc[1].match(/classname="([^"]+)"/);
                const msgM = tc[2].match(/message="([^"]*)"/);
                const name = nameM ? nameM[1] : 'unknown';
                const cls  = classM ? classM[1] : '';
                const msg  = msgM ? msgM[1] : '';
                failures.push({
                  title: `[Test Failure] ${cls}.${name}`,
                  body: `**Suite:** E2E (Selenium)\n**Error:**\n\`\`\`\n${msg.slice(0,1000)}\n\`\`\`\n\n**Run:** ${runUrl}`,
                });
              }
            } catch (e) {}

            if (failures.length === 0) {
              console.log('No failures — skipping issue creation.');
              return;
            }

            // Fetch existing open issues labelled automated-test to dedup
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-test',
              per_page: 100,
            });
            const existingTitles = new Map(existing.map(i => [i.title, i.number]));

            for (const f of failures) {
              if (existingTitles.has(f.title)) {
                // Update existing issue with latest run link
                const issueNumber = existingTitles.get(f.title);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `❌ Still failing in run [#${context.runId}](${runUrl})\n\n${f.body}`,
                });
                console.log(`Updated issue #${issueNumber}: ${f.title}`);
              } else {
                // Create new issue
                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: f.title,
                  body: f.body,
                  labels: ['bug', 'automated-test'],
                });
                console.log(`Created issue #${issue.data.number}: ${f.title}`);
              }
            }

      # ── 10. Final status ───────────────────────────────────────────────────
      - name: Fail job if any suite failed
        if: always()
        run: |
          if [ "${VITEST_FAILED:-}" = "true" ] || [ "${SELENIUM_FAILED:-}" = "true" ]; then
            echo "One or more test suites failed."
            exit 1
          fi
